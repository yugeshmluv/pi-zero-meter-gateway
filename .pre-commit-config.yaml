repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-added-large-files
        args: ['--maxkb=500']
      - id: check-merge-conflict

  - repo: https://github.com/psf/black
    rev: 25.1.0
    hooks:
      - id: black
        language_version: python3.11
        args: [--line-length=100]

  - repo: https://github.com/PyCQA/flake8
    rev: 7.1.1
    hooks:
      - id: flake8
        args:
          - --max-line-length=100
        # Match CI scope exactly
        files: ^(acquisition|uploader|installer_ui|common)/
        # Don't load flake8-bugbear (CI doesn't use it)

  - repo: local
    hooks:
      - id: mypy
        name: mypy
        entry: poetry run mypy
        language: system
        types: [python]
        args:
          - --strict
          - --ignore-missing-imports
          - acquisition
          - uploader
          - installer_ui
          - common
        files: ^(acquisition/meterhub_acq|uploader/meterhub_uploader|installer_ui/meterhub_ui|common/meterhub_common)/
        pass_filenames: false

  - repo: https://github.com/asottile/pyupgrade
    rev: v3.21.2
    hooks:
      - id: pyupgrade
        args: [--py311-plus]
