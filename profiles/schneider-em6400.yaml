meter_type: "Schneider EM6400"
manufacturer: "Schneider Electric"
protocol_version: "Modbus RTU 1.1b3"
baud_rate: 9600
parity: "even"
stop_bits: 1
data_bits: 8
timeout_ms: 1000
description: "Multi-function 3-phase energy meter with advanced monitoring"

registers:
  # Three-phase voltages (Registers 0x0C00-0x0C02)
  - name: "voltage_l1"
    address: 0x0C00
    data_type: "uint16"
    scale: 0.1
    unit: "V"
    description: "Phase L1 RMS voltage"
    read_only: true

  - name: "voltage_l2"
    address: 0x0C01
    data_type: "uint16"
    scale: 0.1
    unit: "V"
    description: "Phase L2 RMS voltage"
    read_only: true

  - name: "voltage_l3"
    address: 0x0C02
    data_type: "uint16"
    scale: 0.1
    unit: "V"
    description: "Phase L3 RMS voltage"
    read_only: true

  # Three-phase currents (Registers 0x0C04-0x0C06)
  - name: "current_l1"
    address: 0x0C04
    data_type: "uint16"
    scale: 0.01
    unit: "A"
    description: "Phase L1 RMS current"
    read_only: true

  - name: "current_l2"
    address: 0x0C05
    data_type: "uint16"
    scale: 0.01
    unit: "A"
    description: "Phase L2 RMS current"
    read_only: true

  - name: "current_l3"
    address: 0x0C06
    data_type: "uint16"
    scale: 0.01
    unit: "A"
    description: "Phase L3 RMS current"
    read_only: true

  # Instantaneous Active Power (Register 0x0DC0 - 32-bit IEEE 754)
  - name: "instant_kw"
    address: 0x0DC0
    data_type: "float32"
    unit: "kW"
    description: "Instantaneous total active power (3-phase sum)"
    read_only: true

  # Total Active Energy - Exported (Register 0xB200 - 32-bit IEEE 754)
  # This is the BILLING REGISTER - never wraps, crash-safe in SQLite
  - name: "totalizer_kwh"
    address: 0xB200
    data_type: "float32"
    unit: "kWh"
    description: "Total active energy delivered (billing register, export counter, never wraps)"
    read_only: true

  # Frequency (Register 0x0D04 - 16-bit unsigned)
  - name: "frequency_hz"
    address: 0x0D04
    data_type: "uint16"
    scale: 0.01
    unit: "Hz"
    description: "Line frequency"
    read_only: true

  # Total Power Factor (Register 0x0D0B - 16-bit signed two's complement)
  - name: "pf_total"
    address: 0x0D0B
    data_type: "int16"
    scale: 0.001
    unit: ""
    description: "Total 3-phase power factor (signed: -1.0 to +1.0, lagging positive)"
    read_only: true

  # Phase L1 Power Factor (Register 0x0D0C)
  - name: "pf_l1"
    address: 0x0D0C
    data_type: "int16"
    scale: 0.001
    unit: ""
    description: "L1 power factor (signed, lagging positive)"
    read_only: true

  # Phase L2 Power Factor (Register 0x0D0D)
  - name: "pf_l2"
    address: 0x0D0D
    data_type: "int16"
    scale: 0.001
    unit: ""
    description: "L2 power factor (signed, lagging positive)"
    read_only: true

  # Phase L3 Power Factor (Register 0x0D0E)
  - name: "pf_l3"
    address: 0x0D0E
    data_type: "int16"
    scale: 0.001
    unit: ""
    description: "L3 power factor (signed, lagging positive)"
    read_only: true
