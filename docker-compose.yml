version: '3.8'

services:
  mqtt:
    image: eclipse-mosquitto:2
    container_name: meterhub-mosquitto
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./docker/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - mosquitto_data:/mosquitto/data
      - mosquitto_logs:/mosquitto/log
    healthcheck:
      test: ["CMD", "mosquitto_sub", "-p", "1883", "-t", "$SYS/#"]
      interval: 10s
      timeout: 5s
      retries: 3

  # Note: Production uses SQLite (local only)
  # PostgreSQL & Redis are optional for development/testing only
  # They are NOT part of the production edge deployment
  postgres:
    image: postgres:15-alpine
    container_name: meterhub-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: meterhub_dev
      POSTGRES_USER: meterhub
      POSTGRES_PASSWORD: dev_password_change_me
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U meterhub"]
      interval: 10s
      timeout: 5s
      retries: 3
    profiles:
      - dev  # Only run with: docker-compose --profile dev up

  redis:
    image: redis:7-alpine
    container_name: meterhub-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    profiles:
      - dev  # Only run with: docker-compose --profile dev up

volumes:
  mosquitto_data:
  mosquitto_logs:
  postgres_data:
  redis_data:

networks:
  default:
    name: meterhub_dev
